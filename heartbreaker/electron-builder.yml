appId: com.spedatox.optimus-mark1
productName: Optimus Mark I

directories:
  output: dist
  buildResources: build

# electron-vite outputs the compiled main/preload/renderer to out/.
files:
  - out/**
  - package.json

# Windows installer (NSIS) — lets you pick the install dir.
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Optimus Mark I

# No code signing for personal/internal builds (Windows SmartScreen will warn;
# that's expected for an unsigned in-house app).
